ai_usage_summary: |
  Used Antigravity Agent powered by Gemini to build a purely offline LightGBM Learning-to-Rank system utilizing semantic similarity, heuristics, and platform trust metrics to score candidates without relying on runtime LLM calls.

methodology_summary: |
  Hybrid ranking engine combining semantic search (BM25 + dense embeddings) with handcrafted features. Scores are fed into an offline LightGBM LambdaMART model. Final scores are then multiplier-adjusted using highly predictive platform trust signals (GitHub activity, interview completion rates, and platform engagement). The architecture avoids runtime LLMs to ensure strict 5-minute constraints while achieving robust, anti-hallucinatory outcomes.

