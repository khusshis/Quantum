<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quantum | Candidate Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: '#0A0A0A',
              surface: '#121212',
              'surface-hover': '#1A1A1A',
              primary: '#EDEDED',
              secondary: '#A1A1AA',
              accent: '#3B82F6', // Blue 500
              border: '#27272A',
            },
            fontFamily: {
              sans: ['Geist', 'sans-serif'],
              mono: ['"Geist Mono"', 'monospace'],
            }
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Geist', sans-serif;
        background-color: #0A0A0A;
        color: #EDEDED;
        overflow-x: hidden;
      }
      
      /* Premium Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #0A0A0A;
      }
      ::-webkit-scrollbar-thumb {
        background: #27272A;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3F3F46;
      }
      
      .score-bar-segment {
        transition: width 0.3s ease, background-color 0.3s ease;
      }
      
      .feature-row:hover {
        background-color: #1A1A1A;
      }
      
      /* Custom Slider Thumb */
      .custom-slider-thumb::-webkit-slider-thumb {
        appearance: none;
        width: 16px;
        height: 16px;
        background-color: #EDEDED;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid #0A0A0A;
        box-shadow: 0 0 0 1px #52525B;
        transition: transform 0.1s, box-shadow 0.1s;
      }
      .custom-slider-thumb::-webkit-slider-thumb:hover {
        transform: scale(1.15);
        box-shadow: 0 0 0 1px #EDEDED;
      }
      .custom-slider-thumb::-moz-range-thumb {
        width: 16px;
        height: 16px;
        background-color: #EDEDED;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid #0A0A0A;
        box-shadow: 0 0 0 1px #52525B;
        transition: transform 0.1s, box-shadow 0.1s;
      }
      .custom-slider-thumb::-moz-range-thumb:hover {
        transform: scale(1.15);
        box-shadow: 0 0 0 1px #EDEDED;
      }

      @keyframes progressShimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(200%); }
      }

      @keyframes fadeSlideUp {
        0% { opacity: 0; transform: translateY(10px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      .progress-shimmer::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 50%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
        animation: progressShimmer 1.5s ease-in-out infinite;
      }

      .loading-fade-in {
        animation: fadeSlideUp 0.4s ease-out forwards;
      }
    </style>
  </head>
  <body class="dark">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
